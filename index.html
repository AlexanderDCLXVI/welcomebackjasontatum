<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Message</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:url("background.jpg") center/cover no-repeat;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(3px);
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      color:white;
      animation:fadeIn 2s ease;
    }

    .image{
      width:260px;
      height:260px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid white;
      animation:float 4s ease-in-out infinite;
      box-shadow:0 0 30px rgba(255,255,255,0.4);
    }

    h1{
      margin-top:20px;
      font-size:32px;
      letter-spacing:2px;
    }

    p{
      margin-top:10px;
      opacity:0.8;
    }

    audio{
      margin-top:25px;
      width:300px;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-15px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:scale(0.9);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="container">

    <img src="picture.jpg" class="image">

    <h1>Voice Message</h1>

    <p>Click play to listen</p>

    <audio controls>
      <source src="audio.mp3" type="audio/mpeg">
    </audio>

  </div>

</body>
</html>
